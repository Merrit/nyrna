# yaml-language-server: $schema=https://raw.githubusercontent.com/flatpak/flatpak-builder/main/data/flatpak-manifest.schema.json
#
# Development manifest for local Flatpak builds.
#
# This is NOT the Flathub release manifest. The release manifest lives at:
#   https://github.com/flathub/codes.merritt.Nyrna
#
# Usage:
#   ./packaging/linux/flatpak/build-local.sh

---
app-id: codes.merritt.Nyrna
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: nyrna
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --talk-name=org.freedesktop.Flatpak # Access host processes
  # Tray icon support
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.kde.KWin # Get window info from KWin for Wayland support
  - --own-name=codes.merritt.Nyrna # Required for NyrnaDbus.initialize() D-Bus RequestName
modules:
  - name: keybinder3
    buildsystem: autotools
    post-install:
      - install -Dm644 COPYING /app/share/licenses/keybinder-3/COPYING
    sources:
      - type: archive
        url: https://github.com/kupferlauncher/keybinder/releases/download/keybinder-3.0-v0.3.2/keybinder-3.0-0.3.2.tar.gz
        sha256: e6e3de4e1f3b201814a956ab8f16dfc8a262db1937ff1eee4d855365398c6020
  # libappindicator
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json
  # Nyrna
  - name: nyrna
    buildsystem: simple
    only-arches:
      - x86_64
    build-commands:
      - bash packaging/linux/flatpak/build-flatpak.sh
    sources:
      # Build from local working tree — no tarball download, no git commit hash.
      - type: dir
        path: ../../../
